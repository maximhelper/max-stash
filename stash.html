<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>max-stash | System</title>
    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="">
    <style>
        :root { 
            --bg: #0a0a0a; --container-bg: #161616; --text: #e0e0e0; 
            --primary: #007bff; --border: #333; --danger: #ff4757; 
            --clever: #2f5be7; --boost: #ff00ff; --clear: #00d2ff; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .app-shell { width: 1018px; height: 573px; background: var(--container-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .nav-tabs { display: flex; flex-direction: row; gap: 12px; padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .nav-tabs button { background: none; border: none; color: var(--text); opacity: 0.6; cursor: pointer; font-weight: bold; padding: 8px 10px; font-size: 0.8em; transition: 0.2s; }
        .nav-tabs button.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .main-layout { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        .sidebar { width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); padding-right: 20px; }
        .player-logo { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4); cursor: pointer; overflow: hidden; transition: 0.5s ease; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        .brand-title { font-size: 1.2rem; font-weight: bold; color: var(--text); }
        .content-area { flex: 1; overflow-y: auto; }
        .panel { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        
        /* MD Content Styles */
        #readme-container h1, #readme-container h2, #readme-container h3 { color: var(--primary); border-bottom: 1px solid var(--border); margin: 15px 0 10px 0; }
        #readme-container h4, #readme-container h5, #readme-container h6 { color: #fff; margin: 10px 0 5px 0; font-size: 0.9em; }
        #readme-container hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
        #readme-container table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        #readme-container th, #readme-container td { border: 1px solid var(--border); padding: 8px; text-align: left; }
        #readme-container code { background: #222; padding: 2px 4px; border-radius: 4px; font-family: monospace; color: var(--clear); }

        input, .action-btn { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); background: #111; color: white; cursor: pointer; font-size: 0.8em; }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; max-height: 260px; }
        .vol-slider { cursor: pointer; accent-color: var(--primary); width: 100%; height: 6px; }
        .stats-font { font-family: monospace; color: var(--primary); font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="nav-tabs">
        <button id="tabBtnReadme" class="active" onclick="showTab('readme', this)">README</button>
        <button id="tabBtnPlayer" onclick="showTab('player', this)">VIDEO PLAYER</button>
        <button id="tabBtnCloak" onclick="showTab('cloak', this)">CLOAKING</button>
        <button id="tabBtnStatistics" onclick="showTab('statistics', this)">STATISTICS</button>
        <button id="tabBtnGames" onclick="showTab('games', this)">GAME CENTER</button>
        <button onclick="systemWipe()" style="color:var(--danger); margin-left: auto;">WIPE</button>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="player-logo" id="logoDev" onclick="devUnlock()">
                <img src="https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/assets/welcomescan.jpg" alt="Logo" class="logo-img">
            </div>
            <div class="brand-title">max-stash</div>
        </div>
        <div class="content-area">
            <div id="tabReadme" class="tab-content active">
                <div class="panel"><div id="readme-container">Fetching...</div></div>
            </div>
            <div id="tabPlayer" class="tab-content">
                <div class="panel">
                    <span style="font-size:0.75em;">VOL: <span id="volVal">100%</span></span>
                    <input type="range" id="volBoost" class="vol-slider" min="1" max="15" value="10">
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="action-btn" id="clearBtn" onclick="toggleClearerAudio()">AUDIO: OFF</button>
                        <button class="action-btn" id="visionBtn" onclick="toggleVision()">ULTRABRIGHT: OFF</button>
                    </div>
                </div>
                <input type="file" id="f"><button id="mainBtn" class="action-btn" style="background:var(--primary);">INITIALIZE PLAYER</button><video id="vid" controls style="display:none;"></video>
            </div>
            <div id="tabCloak" class="tab-content">
                <div class="panel">
                    <input type="text" id="cloakTitle" placeholder="Tab Title"><input type="text" id="cloakDomain" placeholder="Domain"><button class="action-btn" onclick="applyCustomCloak()" style="background:var(--primary);">APPLY</button>
                    <button class="action-btn" onclick="applyCloak('Clever | Portal', 'clever.com')" style="background: var(--clever);">QUICK CLEVER</button>
                </div>
            </div>
            <div id="tabStatistics" class="tab-content"><div class="panel">MEMORY: <div id="usedRam" class="stats-font">--- MB</div></div></div>
            <div id="tabGames" class="tab-content"><div class="panel" style="text-align: center;"><button class="action-btn" onclick="launchGnMath()">OPEN GN-MATH</button><button class="action-btn" onclick="launchUGS()">OPEN UGS</button></div></div>
        </div>
    </div>
</div>

<script>
    let audioCtx, source, gainNode, filterNode, isDev = false, isVision = false, isClear = false;
    const ui = { f: document.getElementById('f'), vid: document.getElementById('vid'), vol: document.getElementById('volBoost'), volVal: document.getElementById('volVal') };

    function showTab(t, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        btn.classList.add('active');
    }

    async function fetchReadme() {
        const readmeBox = document.getElementById('readme-container');
        try {
            const res = await fetch("https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/README.md?nocache=" + Date.now());
            if (res.ok) { 
                let rawText = await res.text();
                let lines = rawText.split('\n');
                let htmlOutput = "";
                let inTable = false;

                for (let line of lines) {
                    let trimmed = line.trim();

                    // Table Detection (Skip separator lines like |---|---|)
                    if (trimmed.startsWith('|') && !trimmed.match(/^\|?\s*:?-+:?\s*\|/)) {
                        let cells = trimmed.split('|').filter(c => c.trim() !== "");
                        let row = `<tr>${cells.map(c => `<td>${c.trim()}</td>`).join('')}</tr>`;
                        if (!inTable) { htmlOutput += "<table>"; inTable = true; }
                        htmlOutput += row;
                        continue;
                    } else if (inTable) {
                        htmlOutput += "</table>";
                        inTable = false;
                    }

                    // Headers 1-6
                    if (trimmed.startsWith('###### ')) htmlOutput += `<h6>${trimmed.slice(7)}</h6>`;
                    else if (trimmed.startsWith('##### ')) htmlOutput += `<h5>${trimmed.slice(6)}</h5>`;
                    else if (trimmed.startsWith('#### ')) htmlOutput += `<h4>${trimmed.slice(5)}</h4>`;
                    else if (trimmed.startsWith('### ')) htmlOutput += `<h3>${trimmed.slice(4)}</h3>`;
                    else if (trimmed.startsWith('## ')) htmlOutput += `<h2>${trimmed.slice(3)}</h2>`;
                    else if (trimmed.startsWith('# ')) htmlOutput += `<h1>${trimmed.slice(2)}</h1>`;
                    // Divider
                    else if (trimmed.startsWith('---') || trimmed.startsWith('***')) htmlOutput += `<hr>`;
                    // List
                    else if (trimmed.startsWith('- ')) htmlOutput += `<ul><li>${trimmed.slice(2)}</li></ul>`;
                    // Checkboxes
                    else if (trimmed.startsWith('- [x]')) htmlOutput += `<input type="checkbox" checked disabled> ${trimmed.slice(6)}<br>`;
                    else if (trimmed.startsWith('- [ ]')) htmlOutput += `<input type="checkbox" disabled> ${trimmed.slice(6)}<br>`;
                    // Default Text
                    else {
                        // Bold/Italic/Code Inline
                        let processed = trimmed
                            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                            .replace(/\*(.*?)\*/g, '<i>$1</i>')
                            .replace(/`(.*?)`/g, '<code>$1</code>');
                        htmlOutput += processed + "<br>";
                    }
                }
                readmeBox.innerHTML = htmlOutput; 
            }
        } catch (e) { readmeBox.innerText = "Error loading README."; }
    }

    /* Keep all other utility functions below (initAudio, devUnlock, etc.) */
    function initAudio() { if (!audioCtx && ui.vid.src) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); source = audioCtx.createMediaElementSource(ui.vid); gainNode = audioCtx.createGain(); filterNode = audioCtx.createBiquadFilter(); filterNode.type = "highpass"; filterNode.frequency.value = 150; source.connect(gainNode); gainNode.connect(audioCtx.destination); } }
    function toggleClearerAudio() { if (!ui.vid.src) return; isClear = !isClear; initAudio(); gainNode.disconnect(); filterNode.disconnect(); if (isClear) { gainNode.connect(filterNode); filterNode.connect(audioCtx.destination); document.getElementById('clearBtn').innerText = "AUDIO: ON"; } else { gainNode.connect(audioCtx.destination); document.getElementById('clearBtn').innerText = "AUDIO: OFF"; } }
    function toggleVision() { isVision = !isVision; ui.vid.style.filter = isVision ? "brightness(1.8) contrast(1.2) saturate(1.1)" : "none"; document.getElementById('visionBtn').innerText = isVision ? "ULTRABRIGHT: ON" : "ULTRABRIGHT: OFF"; }
    function applyCloak(title, domain) { document.title = title; document.getElementById('dynamic-favicon').href = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`; }
    function applyCustomCloak() { const t = document.getElementById('cloakTitle').value, d = document.getElementById('cloakDomain').value; if(t && d) applyCloak(t, d); }
    function resetCloak() { document.title = "max-stash"; document.getElementById('dynamic-favicon').href = "https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/assets/welcomescan.jpg"; }
    function launchGnMath() { fetch("https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/autoupdate.html?t="+Date.now()).then(r=>r.text()).then(t=>{ const w=window.open("about:blank","_blank"); if(w){w.document.write(t);w.document.close();}}); }
    function launchUGS() { fetch("https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/AASINGLEFILE.html?t="+Date.now()).then(r=>r.text()).then(t=>{ const w=window.open("about:blank","_blank"); if(w){w.document.write(t);w.document.close();}}); }
    function systemWipe() { if (ui.vid.src) URL.revokeObjectURL(ui.vid.src); ui.vid.src = ""; ui.vid.style.display = "none"; resetCloak(); showTab('readme', document.getElementById('tabBtnReadme')); }
    function devUnlock() { if (prompt("Key:") === "123!@#qweQWE") { isDev = true; ui.vol.max = "50"; document.getElementById('logoDev').style.boxShadow = "0 0 20px var(--boost)"; } }
    ui.vol.oninput = () => { initAudio(); if (gainNode) gainNode.gain.value = ui.vol.value / 10; ui.volVal.innerText = (ui.vol.value * 10) + "%"; };
    document.getElementById('mainBtn').onclick = () => { const file = ui.f.files[0]; if (file) { ui.vid.src = URL.createObjectURL(file); ui.vid.style.display = "block"; } };
    setInterval(() => { if (window.performance && window.performance.memory) document.getElementById('usedRam').innerText = (window.performance.memory.usedJSHeapSize / 1048576).toFixed(2) + " MB"; }, 1000);
    window.onload = () => { fetchReadme(); resetCloak(); };
</script>
</body>
</html>
