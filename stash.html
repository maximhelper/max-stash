<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="">
    <style>
        :root { 
            --bg: #0a0a0a; --container-bg: #161616; --text: #e0e0e0; 
            --primary: #007bff; --border: #333; --danger: #ff4757; 
            --clever: #2f5be7; --boost: #ff00ff; --clear: #00d2ff; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .app-shell { width: 1018px; height: 573px; background: var(--container-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        .nav-tabs { display: flex; flex-direction: row; gap: 12px; padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .nav-tabs button { background: none; border: none; color: var(--text); opacity: 0.6; cursor: pointer; font-weight: bold; padding: 8px 10px; font-size: 0.8em; transition: 0.2s; }
        .nav-tabs button.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .main-layout { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        .sidebar { width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); padding-right: 20px; }
        .player-logo { width: 70px; height: 70px; background: var(--primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 123, 255, 0.4); cursor: pointer; overflow: hidden; }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        .brand-title { font-size: 1.2rem; font-weight: bold; color: var(--text); }
        .content-area { flex: 1; overflow-y: auto; padding-right: 5px; }
        .panel { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        
        textarea { width: 100%; height: 60px; background: #111; border: 1px solid var(--border); border-radius: 6px; color: white; padding: 10px; resize: none; font-family: monospace; font-size: 0.75em; margin-bottom: 8px; box-sizing: border-box; }
        input, .action-btn { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); background: #111; color: white; box-sizing: border-box; font-size: 0.8em; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        video { width: 100%; border-radius: 8px; background: #000; margin-top: 10px; max-height: 220px; transition: filter 0.3s; }
        .vol-slider { cursor: pointer; accent-color: var(--primary); width: 100%; height: 6px; margin-top: 5px; }
        #readme-container { white-space: pre-wrap; font-family: monospace; font-size: 0.85em; color: #bbb; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="nav-tabs">
        <button id="tabBtnReadme" class="active" onclick="showTab('readme', this)">README</button>
        <button id="tabBtnPlayer" onclick="showTab('player', this)">VIDEO PLAYER</button>
        <button id="tabBtnCloak" onclick="showTab('cloak', this)">CLOAKING</button>
        <button id="tabBtnStatistics" onclick="showTab('statistics', this)">STATISTICS</button>
        <button id="tabBtnGames" onclick="showTab('games', this)">GAME CENTER</button>
        <button onclick="systemWipe()" style="color:var(--danger); margin-left: auto;">WIPE</button>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="player-logo" id="logoDev" onclick="devUnlock()">
                <img src="https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/assets/welcomescan.jpg" alt="Logo" class="logo-img">
            </div>
            <div class="brand-title">max-stash</div>
        </div>

        <div class="content-area">
            <div id="tabReadme" class="tab-content active">
                <div class="panel">
                    <h3 style="margin:0 0 10px 0; color:var(--primary); font-size: 1em;">SYSTEM_LOG:</h3>
                    <div id="readme-container">Fetching README.txt...</div>
                </div>
            </div>

            <div id="tabPlayer" class="tab-content">
                <div class="panel">
                    <textarea id="convInput" placeholder="Base64 Converter..."></textarea>
                    <div style="display:flex; gap:8px; margin-bottom: 10px;">
                        <button class="action-btn" style="background:var(--primary); border:none; font-weight:bold;" onclick="handleBase64(true)">ENCODE</button>
                        <button class="action-btn" style="background:var(--clever); border:none; font-weight:bold;" onclick="handleBase64(false)">DECODE</button>
                    </div>
                    <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
                    <span style="font-size:0.75em;">VOL: <span id="volVal">100%</span></span>
                    <input type="range" id="volBoost" class="vol-slider" min="1" max="15" value="10">
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="action-btn" id="clearBtn" onclick="toggleClearerAudio()" style="color:var(--clear); border-color:var(--clear); background:none; font-size:0.7em;">AUDIO: OFF</button>
                        <button class="action-btn" id="visionBtn" onclick="toggleVision()" style="color:var(--boost); border-color:var(--boost); background:none; font-size:0.7em;">ULTRABRIGHT: OFF</button>
                    </div>
                </div>
                <input type="file" id="f">
                <button id="mainBtn" class="action-btn" style="background:var(--primary); font-weight:bold; border:none;">INITIALIZE PLAYER</button>
                <video id="vid" controls style="display:none;"></video>
            </div>

            <div id="tabCloak" class="tab-content">
                <div class="panel">
                    <input type="text" id="cloakTitle" placeholder="Custom Tab Title">
                    <input type="text" id="cloakDomain" placeholder="Domain (e.g. google.com)">
                    <button class="action-btn" onclick="applyCustomCloak()" style="background:var(--primary); border:none;">APPLY CLOAK</button>
                    <hr style="border:0; border-top:1px solid var(--border); margin:10px 0;">
                    <button class="action-btn" onclick="applyCloak('Clever | Portal', 'clever.com')" style="background: var(--clever); border:none;">QUICK CLEVER</button>
                    <button class="action-btn" onclick="resetCloak()" style="background: #333; border:none;">RESET</button>
                </div>
            </div>

            <div id="tabStatistics" class="tab-content">
                <div class="panel">
                    <p style="font-size: 0.8rem;">MEMORY_USAGE:</p>
                    <div id="usedRam" style="font-family: monospace; color:var(--primary); font-size:1.2rem;">--- MB</div>
                </div>
            </div>

            <div id="tabGames" class="tab-content">
                <div class="panel" style="text-align: center; height: 280px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;">
                    <button class="action-btn" onclick="launchGnMath()" style="width:220px; border-color:var(--boost); color:var(--boost); background:none; font-weight:bold;">OPEN GN-MATH</button>
                    <button class="action-btn" onclick="launchUGS()" style="width:220px; border-color:var(--clear); color:var(--clear); background:none; font-weight:bold;">OPEN UGS</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let audioCtx, source, gainNode, filterNode, isDev = false, isVision = false, isClear = false;
    const ui = { f: document.getElementById('f'), vid: document.getElementById('vid'), vol: document.getElementById('volBoost'), volVal: document.getElementById('volVal') };
    const LOGO_URL = "https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/assets/welcomescan.jpg";

    function showTab(t, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        btn.classList.add('active');
    }

    async function fetchReadme() {
        const readmeBox = document.getElementById('readme-container');
        try {
            const res = await fetch("https://cdn.jsdelivr.net/gh/maximhelper/max-stash@main/README.txt?nocache=" + Date.now());
            if (res.ok) { readmeBox.textContent = await res.text(); }
            else { readmeBox.innerText = "README.txt not found."; }
        } catch (e) { readmeBox.innerText = "Fetch error."; }
    }

    function handleBase64(isEncode) {
        const area = document.getElementById('convInput');
        try { area.value = isEncode ? btoa(area.value) : atob(area.value); }
        catch(e) { alert("Invalid Base64 format."); }
    }

    function initAudio() {
        if (!audioCtx && ui.vid.src) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(ui.vid);
            gainNode = audioCtx.createGain();
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = "highpass";
            filterNode.frequency.value = 150; 
            source.connect(gainNode);
            gainNode.connect(audioCtx.destination);
        }
    }

    function toggleClearerAudio() {
        if (!ui.vid.src) return;
        isClear = !isClear;
        initAudio();
        gainNode.disconnect();
        if (isClear) {
            gainNode.connect(filterNode);
            filterNode.connect(audioCtx.destination);
            document.getElementById('clearBtn').innerText = "AUDIO: CLEAR";
        } else {
            gainNode.connect(audioCtx.destination);
            document.getElementById('clearBtn').innerText = "AUDIO: OFF";
        }
    }

    function toggleVision() {
        isVision = !isVision;
        ui.vid.style.filter = isVision ? "brightness(1.8) contrast(1.2) saturate(1.1)" : "none";
        document.getElementById('visionBtn').innerText = isVision ? "ULTRABRIGHT: ON" : "ULTRABRIGHT: OFF";
    }

    function applyCloak(title, domain) {
        document.title = title;
        document.getElementById('dynamic-favicon').href = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
    }

    function applyCustomCloak() {
        const t = document.getElementById('cloakTitle').value, d = document.getElementById('cloakDomain').value;
        if(t && d) applyCloak(t, d);
    }

    function resetCloak() {
        document.title = "max-stash";
        document.getElementById('dynamic-favicon').href = LOGO_URL;
    }

    function launchGnMath() {
        fetch("https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/autoupdate.html?t=" + Date.now()).then(r => r.text()).then(t => {
            const w = window.open("about:blank", "_blank");
            if (w) { w.document.write(t); w.document.close(); }
        });
    }

    function launchUGS() {
        fetch("https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/AASINGLEFILE.html?t=" + Date.now()).then(r => r.text()).then(t => {
            const w = window.open("about:blank", "_blank");
            if (w) { w.document.write(t); w.document.close(); }
        });
    }

    function systemWipe() {
        if (ui.vid.src) URL.revokeObjectURL(ui.vid.src);
        ui.vid.src = ""; ui.vid.style.display = "none";
        isDev = false; isVision = false; isClear = false;
        ui.vol.max = "15"; ui.vol.value = "10"; ui.volVal.innerText = "100%";
        ui.vid.style.filter = "none";
        document.getElementById('convInput').value = "";
        resetCloak();
        showTab('readme', document.getElementById('tabBtnReadme'));
    }

    function devUnlock() {
        if (prompt("Key:") === "123!@#qweQWE") {
            isDev = true; ui.vol.max = "50"; 
            document.getElementById('volVal').style.color = "var(--boost)";
        }
    }

    ui.vol.oninput = () => {
        initAudio();
        if (gainNode) gainNode.gain.value = ui.vol.value / 10;
        ui.volVal.innerText = (ui.vol.value * 10) + "%";
    };

    document.getElementById('mainBtn').onclick = () => {
        const file = ui.f.files[0];
        if (file) { ui.vid.src = URL.createObjectURL(file); ui.vid.style.display = "block"; }
    };

    setInterval(() => {
        if (window.performance && window.performance.memory) {
            document.getElementById('usedRam').innerText = (window.performance.memory.usedJSHeapSize / 1048576).toFixed(2) + " MB";
        }
    }, 1000);

    window.onload = () => { fetchReadme(); setTimeout(resetCloak, 1000); };
</script>
</body>
</html>
