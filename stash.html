<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>max-stash | Media</title>
    <link id="dynamic-favicon" rel="icon" type="image/jpeg" href="">
    <style>
        :root { 
            --bg: #0a0a0a; --container-bg: #161616; --text: #e0e0e0; 
            --primary: #007bff; --border: #333; --danger: #ff4757; 
            --clear: #00d2ff; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .app-shell { width: 1018px; height: 573px; background: var(--container-bg); border: 1px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }
        
        .nav-tabs { display: flex; flex-direction: row; gap: 8px; padding: 15px 25px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); align-items: center; }
        .nav-tabs button { background: none; border: none; color: var(--text); opacity: 0.6; cursor: pointer; font-weight: bold; padding: 8px 10px; font-size: 0.8em; transition: 0.2s; }
        .nav-tabs button.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        
        /* UGS Button Style */
        .ugs-btn { color: var(--clear) !important; border: 1px solid rgba(0, 210, 255, 0.3) !important; border-radius: 4px; cursor: pointer !important; }

        .main-layout { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        .sidebar { width: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); padding-right: 20px; }
        
        /* THE SECRET LOGO: Standard arrow mouse, no pointer hand */
        .player-logo { 
            width: 70px; height: 70px; background: var(--primary); 
            border-radius: 50%; display: flex; justify-content: center; 
            align-items: center; border: 1px solid rgba(255,255,255,0.3); 
            margin-bottom: 15px; overflow: hidden; 
            cursor: default; 
        }
        .logo-img { width: 100%; height: 100%; object-fit: cover; }

        .content-area { flex: 1; overflow-y: auto; }
        .panel { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; }
        .tab-content { display: none; height: 100%; }
        .tab-content.active { display: block; }
        
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); margin-top: 10px; }
        input, .action-btn { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px; border: 1px solid var(--border); background: #111; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="nav-tabs">
        <button class="active" onclick="showTab('music', this)">MUSIC</button>
        <button onclick="showTab('player', this)">PLAYER</button>
        <button onclick="showTab('cloak', this)">CLOAK</button>
        <button onclick="showTab('gnmath', this)">GN-MATH</button>
        
        <button class="ugs-btn" onclick='fetch("https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile@main/AASINGLEFILE.html?t="+Date.now()).then(r => r.text()).then(t => {const w = window.open("about:blank", "_blank"); if(w){w.document.open();w.document.write(t);w.document.close();}});'>UGS</button>
        
        <button onclick="location.reload()" style="color:var(--danger); margin-left: auto; cursor: pointer;">RELOAD</button>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <div class="player-logo">
                <img id="sidebarLogo" src="" alt="" class="logo-img">
            </div>
            <div style="font-size: 0.9rem; font-weight: bold; opacity: 0.4;">max-stash</div>
        </div>

        <div class="content-area">
            <div id="tabMusic" class="tab-content active">
                <div class="panel">
                    <h3 style="margin:0; color:var(--primary);">Audio Library</h3>
                    <p style="font-size: 0.8rem; opacity: 0.6;">Music files must be in /assets/music/</p>
                    <div id="musicList"></div>
                    <audio id="audioPlayer" controls></audio>
                </div>
            </div>

            <div id="tabPlayer" class="tab-content">
                <div class="panel">
                    <input type="file" id="f">
                    <video id="vid" controls style="display:none; width:100%; margin-top:10px;"></video>
                </div>
            </div>

            <div id="tabCloak" class="tab-content">
                <div class="panel">
                    <input type="text" id="cloakTitle" placeholder="Tab Title">
                    <input type="text" id="cloakDomain" placeholder="Favicon Domain (google.com)">
                    <button class="action-btn" onclick="applyCloak()" style="background:var(--primary); cursor: pointer;">APPLY</button>
                </div>
            </div>

            <div id="tabGnmath" class="tab-content">
                <div class="panel"><h3>GN-MATH</h3><p>Module Loaded.</p></div>
            </div>
        </div>
    </div>
</div>

<script>
    const USER = "maximhelper";
    const REPO = "max-stash";
    // The "Time Key" forces the image to refresh from GitHub every minute
    const timeKey = Math.floor(Date.now() / 60000); 
    const IMG_URL = `https://cdn.jsdelivr.net/gh/${USER}/${REPO}@main/assets/welcomescan.jpg?v=${timeKey}`;

    function showTab(t, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-tabs button').forEach(el => el.classList.remove('active'));
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        btn.classList.add('active');
    }

    function applyCloak() {
        const title = document.getElementById('cloakTitle').value;
        const dom = document.getElementById('cloakDomain').value;
        if(title) document.title = title;
        if(dom) document.getElementById('dynamic-favicon').href = `https://www.google.com/s2/favicons?domain=${dom}&sz=64`;
    }

    // Set the image on start
    window.onload = () => {
        document.getElementById('sidebarLogo').src = IMG_URL;
        document.getElementById('dynamic-favicon').href = IMG_URL;
        console.log("Image requested from: ", IMG_URL);
    };

    document.getElementById('f').onchange = (e) => {
        const v = document.getElementById('vid');
        v.src = URL.createObjectURL(e.target.files[0]);
        v.style.display = "block";
    };
</script>
</body>
</html>
